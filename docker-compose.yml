version: '3.8'

services:
  cape-signature-gen:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cape-signature-gen
    volumes:
      - .:/app
      - ./data:/app/data
      - ./notebooks:/app/notebooks
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    working_dir: /app
    command: bash
